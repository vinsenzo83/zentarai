<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="markbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b98122"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>
  <!-- Dark background (square, no rounding — matches navbar border-radius:0) -->
  <rect width="64" height="64" fill="#030507"/>
  <!-- Emerald border (1.5px scaled → 2.5px) -->
  <rect x="1.25" y="1.25" width="61.5" height="61.5" fill="url(#markbg)" stroke="#10b981" stroke-width="2.5"/>
  <!-- Brain icon (FontAwesome fa-brain simplified path, centered) -->
  <!-- Using a stylised brain SVG path scaled to ~36x36 at center -->
  <g transform="translate(14, 14) scale(1.8)">
    <!-- left hemisphere -->
    <path d="M10 5 C6 5 3 7.5 3 11 C3 13 4 14.5 5.5 15.5 C5 16 4.5 16.8 4.5 17.5 C4.5 19.5 6 21 8 21 C8.5 21 9 20.9 9.5 20.7 L9.5 22 L10.5 22 L10.5 5 Z"
          fill="none" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- right hemisphere -->
    <path d="M10 5 C14 5 17 7.5 17 11 C17 13 16 14.5 14.5 15.5 C15 16 15.5 16.8 15.5 17.5 C15.5 19.5 14 21 12 21 C11.5 21 11 20.9 10.5 20.7 L10.5 22 L9.5 22 L9.5 5 Z"
          fill="none" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- connector lines -->
    <line x1="10" y1="8" x2="10" y2="20" stroke="#10b981" stroke-width="0.8" opacity="0.5"/>
    <line x1="6" y1="12" x2="14" y2="12" stroke="#10b981" stroke-width="0.8" opacity="0.4"/>
  </g>
  <!-- Corner marks (matches ZentarAI terminal aesthetic) -->
  <path d="M4 2 L2 2 L2 4" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <path d="M60 2 L62 2 L62 4" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <path d="M4 62 L2 62 L2 60" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <path d="M60 62 L62 62 L62 60" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
</svg>
