<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="f1"><feGaussianBlur stdDeviation="1" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="64" height="64" fill="url(#bg)" rx="12"/>
  <rect width="64" height="64" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.3" rx="12"/>
  <!-- Corner marks -->
  <path d="M6 3 L3 3 L3 6" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <path d="M58 3 L61 3 L61 6" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <path d="M6 61 L3 61 L3 58" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <path d="M58 61 L61 61 L61 58" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <!-- Hex frame -->
  <polygon points="32,10 46,18 46,32 46,46 32,54 18,46 18,32 18,18" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.2"/>
  <polygon points="32,16 42,22 42,32 42,42 32,48 22,42 22,32 22,22" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <!-- Signal lines -->
  <line x1="26" y1="28" x2="38" y2="28" stroke="#10b981" stroke-width="1" opacity="0.35"/>
  <line x1="24" y1="32" x2="40" y2="32" stroke="#10b981" stroke-width="1.5" opacity="0.9" filter="url(#f1)"/>
  <line x1="26" y1="36" x2="38" y2="36" stroke="#10b981" stroke-width="1" opacity="0.35"/>
  <!-- Z -->
  <text x="32" y="36" font-family="'Courier New',monospace" font-size="14" font-weight="900" fill="url(#glow)" text-anchor="middle" filter="url(#f1)">Z</text>
  <!-- Pulse -->
  <circle cx="32" cy="32" r="2" fill="#10b981" opacity="0.9"/>
</svg>
