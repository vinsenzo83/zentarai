<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="f1"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="380" height="80" fill="url(#bg)" rx="10"/>
  <rect width="380" height="80" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.25" rx="10"/>
  <!-- Corner marks -->
  <path d="M10 4 L4 4 L4 10" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.5"/>
  <path d="M370 4 L376 4 L376 10" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.5"/>
  <path d="M10 76 L4 76 L4 70" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.5"/>
  <path d="M370 76 L376 76 L376 70" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.5"/>
  <!-- Icon hex -->
  <polygon points="40,20 56,29 56,40 56,51 40,60 24,51 24,40 24,29" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  <polygon points="40,26 52,33 52,40 52,47 40,54 28,47 28,40 28,33" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <!-- Signal lines in icon -->
  <line x1="34" y1="37" x2="46" y2="37" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="40" x2="48" y2="40" stroke="#10b981" stroke-width="1.5" opacity="0.9" filter="url(#f1)"/>
  <line x1="34" y1="43" x2="46" y2="43" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <text x="40" y="44" font-family="'Courier New',monospace" font-size="13" font-weight="900" fill="#10b981" text-anchor="middle">Z</text>
  <!-- Name -->
  <text x="72" y="44" font-family="'Courier New',monospace" font-size="22" font-weight="900" fill="url(#glow)" letter-spacing="1" filter="url(#f1)">ZentarAI</text>
  <!-- Tagline -->
  <text x="72" y="60" font-family="'Courier New',monospace" font-size="8" fill="#34d399" letter-spacing="3" opacity="0.7">AI PREDICTIVE INTELLIGENCE</text>
  <!-- Right: token badge -->
  <rect x="300" y="28" width="62" height="22" rx="4" fill="rgba(16,185,129,0.08)" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="331" y="43" font-family="'Courier New',monospace" font-size="10" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="1">ZNTR</text>
</svg>
