<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="markbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b98120"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="200" height="200" fill="#030507"/>
  <!-- Outer border -->
  <rect x="1" y="1" width="198" height="198" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2"/>
  <!-- Icon mark: square with emerald border, no rounding (68x68 centered at 100,82) -->
  <rect x="66" y="32" width="68" height="68" fill="url(#markbg)" stroke="#10b981" stroke-width="1.5"/>
  <!-- Brain icon scaled inside icon mark -->
  <g transform="translate(72, 38) scale(2.15)">
    <path d="M10 5 C6 5 3 7.5 3 11 C3 13 4 14.5 5.5 15.5 C5 16 4.5 16.8 4.5 17.5 C4.5 19.5 6 21 8 21 C8.5 21 9 20.9 9.5 20.7 L9.5 22 L10.5 22 L10.5 5 Z"
