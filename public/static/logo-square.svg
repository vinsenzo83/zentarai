    <path d="M10 5 C14 5 17 7.5 17 11 C17 13 16 14.5 14.5 15.5 C15 16 15.5 16.8 15.5 17.5 C15.5 19.5 14 21 12 21 C11.5 21 11 20.9 10.5 20.7 L10.5 22 L9.5 22 L9.5 5 Z"
          fill="none" stroke="#10b981" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="10" y1="8" x2="10" y2="20" stroke="#10b981" stroke-width="0.7" opacity="0.5"/>
    <line x1="6" y1="12" x2="14" y2="12" stroke="#10b981" stroke-width="0.7" opacity="0.4"/>
  </g>
  <!-- Corner marks on icon -->
  <path d="M70 36 L66 36 L66 40" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.7"/>
  <path d="M130 36 L134 36 L134 40" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.7"/>
  <path d="M70 96 L66 96 L66 92" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.7"/>
  <path d="M130 96 L134 96 L134 92" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.7"/>
  <!-- ZentarAI text -->
  <text x="100" y="148" font-family="system-ui, sans-serif" font-size="22"
        font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.3">Zentar<tspan fill="#10b981">AI</tspan></text>
  <!-- Tagline -->
  <text x="100" y="165" font-family="'Courier New', monospace" font-size="7.5"
