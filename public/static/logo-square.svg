<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="16"/>
  <rect width="200" height="200" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" rx="16"/>
  <!-- Corner marks -->
  <path d="M16 8 L8 8 L8 16" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <path d="M184 8 L192 8 L192 16" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <path d="M16 192 L8 192 L8 184" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <path d="M184 192 L192 192 L192 184" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <!-- Z hex icon -->
  <polygon points="100,52 128,68 128,100 128,132 100,148 72,132 72,100 72,68" fill="none" stroke="#10b981" stroke-width="2" opacity="0.25"/>
  <polygon points="100,62 120,73 120,100 120,127 100,138 80,127 80,100 80,73" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <!-- Signal lines -->
  <line x1="88" y1="90" x2="112" y2="90" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
  <line x1="84" y1="100" x2="116" y2="100" stroke="#10b981" stroke-width="2" opacity="0.8" filter="url(#f1)"/>
  <line x1="88" y1="110" x2="112" y2="110" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
  <!-- Z letter -->
  <text x="100" y="107" font-family="'Courier New',monospace" font-size="26" font-weight="900" fill="url(#glow)" text-anchor="middle" filter="url(#f1)">Z</text>
  <!-- Dot pulse -->
  <circle cx="100" cy="100" r="3" fill="#10b981" opacity="0.9"/>
  <circle cx="100" cy="100" r="6" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <!-- Text -->
  <text x="100" y="164" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="3">ZENTAR</text>
  <text x="100" y="178" font-family="'Courier New',monospace" font-size="8" fill="#34d399" text-anchor="middle" letter-spacing="5" opacity="0.7">AI</text>
</svg>
